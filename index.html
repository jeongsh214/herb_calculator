<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>약초 조합 계산기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="top-bar">
    <div class="left">
      합계: <span id="total">0</span>
    </div>

    <button id="darkBtn">🌙</button>

    <div class="right">
      결과: <span id="result">-</span>
    </div>
  </div>

  <div class="need-box">
    <div class="need-row">
      <div class="need-left">
        필요 총합: <span id="neededTotals">-</span>
      </div>
      <div class="need-right">
        <select id="needSelect">
          <option value="">환 선택</option>
        </select>
      </div>
    </div>
  </div>

  <button id="toggleBtn" class="toggle-button" onclick="toggleGroups()">전체 접기</button>

  <div id="groupsWrapper">
    <div id="groupsContainer" class="groups-container"></div>
    <button class="reset-button" onclick="reset()">초기화</button>
  </div>

  <script src="script.js"></script>
</body>
<div class="credit">
  <img src="mark1.png" class="credit-logo" />
  <img src="mark2.png" class="credit-logo" />
  <span>© 2026 Jeong_sh020123 All rights reserved</span>
</div>
</html>
